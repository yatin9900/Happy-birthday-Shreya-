<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Shreya</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script&display=swap" rel="stylesheet">

<style>
:root{
--gold:#D4AF37;
--black:#0a0a0a;
}

body{
margin:0;
background:var(--black);
color:white;
font-family:Georgia;
text-align:center;
overflow:hidden;
}

.page{
display:none;
min-height:100vh;
justify-content:center;
align-items:center;
flex-direction:column;
padding:20px;
}

.active{display:flex;}

h1{color:var(--gold);}

button{
background:var(--gold);
border:none;
padding:12px 25px;
border-radius:30px;
font-weight:bold;
cursor:pointer;
margin-top:20px;
}

/* CAKE */
.cake{
width:220px;
height:120px;
background:#5a2d0c;
border-radius:10px;
position:relative;
}
.icing{
position:absolute;
top:-15px;
width:220px;
height:40px;
background:#fff;
border-radius:50%;
}
.candle{
width:15px;
height:50px;
background:var(--gold);
position:absolute;
top:-60px;
left:100px;
display:none;
}
.flame{
width:10px;
height:20px;
background:orange;
border-radius:50%;
position:absolute;
top:-20px;
left:2px;
display:none;
box-shadow:0 0 10px orange;
}

/* DECOR */
.decor{
position:fixed;
top:0;
width:100%;
display:none;
font-size:30px;
}

/* BALLOONS */
.row{display:flex; gap:15px;}
.balloon{
width:80px;
height:100px;
background:var(--gold);
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}
.popped{
background:transparent;
border:2px dashed var(--gold);
}

/* SLIDER */
.slider{
width:300px;
height:400px;
overflow:hidden;
}
.slide{
width:100%;
height:100%;
display:none;
object-fit:cover;
}
.active-img{display:block;}

/* LETTER */
.letter{
background:#fff;
color:black;
padding:30px;
max-width:600px;
font-family:'Dancing Script', cursive;
line-height:2em;
}

/* FIREWORKS */
#fwCanvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
}
</style>
</head>

<body>

<!-- PAGE 1 -->
<div class="page active" id="p1">
<h1 id="title"></h1>
<p id="subtitle"></p>
<button onclick="next(2)">Start the surprise</button>
</div>

<!-- PAGE 2 -->
<div class="page" id="p2">
<div class="decor" id="decor">🎈 🎉 🎈 🎉 🎈</div>

<div class="cake">
<div class="icing"></div>
<div class="candle" id="candle">
<div class="flame" id="flame"></div>
</div>
</div>

<h1 id="hbd" style="display:none;">Happy Birthday Shreya!!</h1>

<button onclick="decorate()">Decorate</button>
<button id="lightBtn" onclick="light()" style="display:none;">Light the candle</button>
<button id="nextBtn" onclick="next(3)" style="display:none;">Pop the Balloon</button>
</div>

<!-- PAGE 3 -->
<div class="page" id="p3">
<h1>Pop them!</h1>
<div class="row">
<div class="balloon" onclick="pop(this,'You')">?</div>
<div class="balloon" onclick="pop(this,'Are')">?</div>
<div class="balloon" onclick="pop(this,'Truly')">?</div>
<div class="balloon" onclick="pop(this,'Special')">?</div>
</div>
<button id="nextB" onclick="next(4)" style="display:none;">Next</button>
</div>

<!-- PAGE 4 -->
<div class="page" id="p4">
<h1>CUTIEE &lt;3</h1>
<div class="slider">
<img src="photo1.jpg" class="slide active-img">
<img src="photo2.jpg" class="slide">
<img src="photo3.jpg" class="slide">
</div>
<button onclick="prev()">←</button>
<button onclick="nextSlide()">→</button>
<button onclick="next(5)">Open my message</button>
</div>

<!-- PAGE 5 -->
<div class="page" id="p5">
<div class="letter" id="letter"></div>
<button onclick="next(6)">Next</button>
</div>

<!-- PAGE 6 -->
<div class="page" id="p6">
<p>Continue to see fireworks</p>
<button onclick="fireworks()">Show Fireworks</button>
</div>

<!-- PAGE 7 -->
<div class="page" id="p7">
<canvas id="fwCanvas"></canvas>

<h2 id="endMsg" style="display:none; position:absolute; top:40%; width:100%;"></h2>
</div>

<script>
let popCount=0;
let slide=0;

/* TYPEWRITER FUNCTION */
function typeWriter(el, text, speed=40){
el.innerHTML="";
let i=0;
function typing(){
if(i<text.length){
el.innerHTML += text.charAt(i);
i++;
setTimeout(typing,speed);
}
}
typing();
}

/* INITIAL TEXT */
typeWriter(document.getElementById("title"),"A girl was born 17 years ago!",50);
setTimeout(()=>{
typeWriter(document.getElementById("subtitle"),"Yes, it's YOU! A small birthday gift from me",40);
},1500);

function next(n){
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
document.getElementById('p'+n).classList.add('active');

if(n==5){
typeWriter(document.getElementById("letter"),
"Happy Birthday Shreya! You deserve all the happiness, love and smiles in the world today and always. You have this special way of making everything brighter around you. Anyways I couldn't celebrate your birthday like last time and I didn't want to.. But yeah I couldn't resist myself wishing you. I hope your days are filled with laughter, surprises, and moments that make you smile and happy.",
25);
}
}

function decorate(){
document.getElementById('decor').style.display='block';
document.getElementById('candle').style.display='block';
document.getElementById('lightBtn').style.display='inline-block';
}

function light(){
document.getElementById('flame').style.display='block';
document.getElementById('hbd').style.display='block';
document.getElementById('nextBtn').style.display='inline-block';
}

function pop(el,text){
if(!el.classList.contains('popped')){
el.classList.add('popped');
el.innerText=text;
popCount++;
if(popCount==4) document.getElementById('nextB').style.display='block';
}
}

function nextSlide(){
let s=document.querySelectorAll('.slide');
s[slide].classList.remove('active-img');
slide=(slide+1)%s.length;
s[slide].classList.add('active-img');
}

function prev(){
let s=document.querySelectorAll('.slide');
s[slide].classList.remove('active-img');
slide=(slide-1+s.length)%s.length;
s[slide].classList.add('active-img');
}

function fireworks(){
next(7);

const canvas=document.getElementById("fwCanvas");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];
let boom=new Audio("https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9bcd4b.mp3?filename=firework-explosion-1-18387.mp3");

function createFirework(){
let x=Math.random()*canvas.width;
let y=Math.random()*canvas.height/2;

for(let i=0;i<80;i++){
particles.push({
x:x,
y:y,
angle:Math.random()*2*Math.PI,
speed:Math.random()*5+2,
life:100
});
}

boom.currentTime=0;
boom.play();
}

function animate(){
ctx.fillStyle="rgba(0,0,0,0.2)";
ctx.fillRect(0,0,canvas.width,canvas.height);

particles.forEach((p,i)=>{
p.x+=Math.cos(p.angle)*p.speed;
p.y+=Math.sin(p.angle)*p.speed;
p.life--;

ctx.beginPath();
ctx.arc(p.x,p.y,2,0,Math.PI*2);
ctx.fillStyle="gold";
ctx.fill();

if(p.life<=0) particles.splice(i,1);
});

requestAnimationFrame(animate);
}

let launcher=setInterval(createFirework,800);
animate();

setTimeout(()=>{
clearInterval(launcher);

typeWriter(document.getElementById("endMsg"),
"Sorry I couldn't do fireworks in reality but I could do that digitally. I hope this small surprise gave you a smile and it's a three days brain storming work, I hope you liked it. ~From Yatin",
25);

document.getElementById("endMsg").style.display="block";

},25000);
}
</script>

</body>
</html>
