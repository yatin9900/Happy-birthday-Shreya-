<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Shreya</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@1&family=Dancing+Script&display=swap" rel="stylesheet">

<style>
:root{--gold:#C9A227;}
body{margin:0;background:#000;color:white;font-family:'Playfair Display', serif;overflow:hidden;}
#stars{position:fixed;top:0;left:0;z-index:-1;}

.box{
    position:relative; width:90%; max-width:600px; padding:25px 25px 25px 50px;
    background: linear-gradient(to bottom, #fff 95%, #ccc 100%), repeating-linear-gradient(to bottom, transparent, transparent 28px, #ddd 29px);
    color:#333; font-family:'Dancing Script', cursive; line-height:30px;
    border-radius:12px; box-shadow:0 10px 30px rgba(0,0,0,0.5); text-align:left; z-index: 10;
}
.box::before{ content:""; position:absolute; left:20px; top:0; bottom:0; width:2px; background:#ff6b6b; }

.page{ display:none; min-height:100vh; justify-content:center; align-items:center; flex-direction:column; text-align: center; padding: 20px;}
.active{display:flex;}
h1{color:var(--gold);}

button{
    background:var(--gold); border:none; padding:12px 25px; border-radius:30px;
    cursor:pointer; margin-top:20px; color: black; font-weight: bold; display: none;
}

.gif{ position:absolute; top:20px; left:50%; transform:translateX(-50%); width:120px; }

/* 🎂 CAKE styling */
.cake{position:relative; width:220px; height:140px;}
.layer{position:absolute; bottom:0; width:220px; height:100px; background:linear-gradient(#3b1f0f,#2a1409); border-radius:10px;}
.icing{position:absolute; top:0; width:220px; height:40px; background:#fff; border-radius:50%;}
.candle{position:absolute; top:-60px; left:100px; width:15px; height:60px; background:var(--gold); display:none;}
.flame{
    width:12px; height:22px; background:radial-gradient(circle,#ffd700,orange);
    border-radius:50%; position:absolute; top:-25px; left:1px;
    display:none; animation:flicker 0.15s infinite; box-shadow:0 0 20px orange,0 0 40px gold;
}
@keyframes flicker{ 0%, 100%{transform:scale(1);} 50%{transform:scale(1.3);} }

.decor{ position:fixed; top:0; width:100%; text-align:center; font-size:30px; display:none; animation:drop 1s ease; }
@keyframes drop{ from{transform:translateY(-100px);} to{transform:translateY(0);} }

.row{display:flex; gap:15px; margin-top: 20px;}
.balloon{
    width:80px; height:100px; border-radius:50%; display:flex; align-items:center; justify-content:center;
    cursor:pointer; color:white; font-weight:bold;
}
.balloon:nth-child(1){background:red;} .balloon:nth-child(2){background:blue;}
.balloon:nth-child(3){background:pink;} .balloon:nth-child(4){background:purple;}
.popped{background:transparent !important; border: 2px dashed var(--gold); color: var(--gold);}

.slider{width:300px; height:400px; margin: 20px; overflow: hidden; border: 3px solid var(--gold); border-radius: 10px;}
.slide{width:100%; height:100%; display:none; object-fit:cover;}
.active-img{display:block;}

#fwCanvas{position:fixed; top:0; left:0; width:100%; height:100%;}
</style>
</head>

<body>

<audio id="bgMusic" src="bg.mp3" loop></audio>
<audio id="fireMusic" src="fire.mp3"></audio>

<canvas id="stars"></canvas>

<div class="page active" id="p1">
    <img src="girl.gif" class="gif">
    <div class="box">
        <h1 id="title"></h1>
        <p id="subtitle"></p>
    </div>
    <button id="startBtn" onclick="startSurprise()">Start the surprise</button>
</div>

<div class="page" id="p2">
    <div class="cake">
        <div class="layer"></div>
        <div class="icing"></div>
        <div class="candle" id="candle"><div class="flame" id="flame"></div></div>
    </div>
    <div id="decorations" class="decor">🎉 🎈 🎊 🎈 🎉 🎊 🎈</div>
    <h1 id="hbd" style="display:none;">Happy Birthday Shreya!!</h1>
    <button id="decorateBtn" onclick="decorate()">Decorate</button>
    <button id="lightBtn" onclick="light()">Light the candle</button>
    <button id="nextBtn" onclick="next(3)">Pop the Balloon</button>
</div>

<div class="page" id="p3">
    <div class="box"><h1>Pop them!</h1></div>
    <div class="row">
        <div class="balloon" onclick="pop(this,'You')"></div>
        <div class="balloon" onclick="pop(this,'Are')"></div>
        <div class="balloon" onclick="pop(this,'Truly')"></div>
        <div class="balloon" onclick="pop(this,'Special')"></div>
    </div>
    <button id="nextB" onclick="next(4)">Next</button>
</div>

<div class="page" id="p4">
    <div class="box"><h1>CUTIEE &lt;3</h1></div>
    <div class="slider">
        <img src="photo1.jpg" class="slide active-img">
        <img src="photo2.jpg" class="slide">
        <img src="photo3.jpg" class="slide">
    </div>
    <div>
        <button style="display:inline-block" onclick="prev()">←</button>
        <button style="display:inline-block" onclick="nextSlide()">→</button>
    </div>
    <button style="display:inline-block" onclick="next(5)">Open my message</button>
</div>

<div class="page" id="p5">
    <div class="box" id="letter"></div>
    <button id="next5" onclick="next(6)">Next</button>
</div>

<div class="page" id="p6">
    <div class="box"><p>Continue to see fireworks</p></div>
    <button style="display:block" onclick="fireworks()">Show Fireworks</button>
</div>

<div class="page" id="p7">
    <canvas id="fwCanvas"></canvas>
    <div class="box" style="z-index: 100;">
        <p>✨ Please wait till the end ✨</p>
        <button id="finalBtn" onclick="showFinal()">My Last Message</button>
    </div>
</div>

<div class="page" id="p8">
    <div class="box" id="endMsg"></div>
</div>

<script>
/* 🎵 AUDIO VARIABLES */
const bgMusic = document.getElementById("bgMusic");
const fireMusic = document.getElementById("fireMusic");

/* 🌌 STARS */
const s=document.getElementById("stars");
const ctx=s.getContext("2d");
s.width=innerWidth; s.height=innerHeight;
let stars=[];
for(let i=0;i<100;i++){ stars.push({x:Math.random()*s.width,y:Math.random()*s.height,r:Math.random()*2}); }
function anim(){
    ctx.clearRect(0,0,s.width,s.height);
    stars.forEach(st=>{ st.y+=0.3; if(st.y>s.height) st.y=0; ctx.beginPath(); ctx.arc(st.x,st.y,st.r,0,6.28); ctx.fillStyle="white"; ctx.fill(); });
    requestAnimationFrame(anim);
}
anim();

/* TYPEWRITER FUNCTION */
function type(elId, text, cb) {
    const el = document.getElementById(elId);
    let i = 0; el.innerHTML = "";
    function t() {
        if (i < text.length) { el.innerHTML += text[i++]; setTimeout(t, 25); }
        else if (cb) cb();
    }
    t();
}

/* INITIAL TEXT */
window.onload = () => {
    type("title", "A Very Special And Precious Girl Was Born 17 years ago", () => {
        type("subtitle", "Yes, it's YOU! A small birthday gift from me", () => {
            document.getElementById("startBtn").style.display = "block";
        });
    });
};

/* MUSIC START ON BUTTON CLICK */
function startSurprise() {
    bgMusic.play().catch(e => console.log("Music play blocked by browser"));
    next(2);
}

/* NAVIGATION */
function next(n){
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    document.getElementById('p'+n).classList.add('active');
    if(n==2) setTimeout(()=>document.getElementById("decorateBtn").style.display="block",800);
    if(n==5){
        type("letter", "Happy Birthday Shreya! You deserve all the happiness, love and smiles in the world today and always. You have this special way of making everything brighter around you. Anyways I couldn't celebrate your birthday like last time and I didn't want to.. But yeah I couldn't resist myself wishing you. I hope your days are filled with laughter, surprises, and moments that make you smile and happy.", () => {
            document.getElementById("next5").style.display = "block";
        });
    }
}

function decorate(){
    document.getElementById("decorations").style.display="block";
    document.getElementById("candle").style.display="block";
    document.getElementById("decorateBtn").style.display="none";
    document.getElementById("lightBtn").style.display="inline-block";
}

function light(){
    document.getElementById("flame").style.display="block";
    document.getElementById("hbd").style.display="block";
    document.getElementById("lightBtn").style.display="none";
    document.getElementById("nextBtn").style.display="inline-block";
    /* Simple Confetti */
    for(let i=0;i<50;i++){
        let c=document.createElement("div");
        c.style.position="fixed"; c.style.width="5px"; c.style.height="5px"; c.style.background="gold";
        c.style.top="50%"; c.style.left="50%"; c.style.animation="fall 2s linear forwards";
        document.body.appendChild(c);
        setTimeout(()=>c.remove(),2000);
    }
}

let count=0;
function pop(el,text){
    if(!el.classList.contains('popped')){
        el.classList.add('popped'); el.innerText=text; count++;
        if(count==4) document.getElementById("nextB").style.display="block";
    }
}

let slideIdx=0;
function nextSlide(){
    let slides=document.querySelectorAll('.slide');
    slides[slideIdx].classList.remove('active-img');
    slideIdx=(slideIdx+1)%slides.length;
    slides[slideIdx].classList.add('active-img');
}
function prev(){
    let slides=document.querySelectorAll('.slide');
    slides[slideIdx].classList.remove('active-img');
    slideIdx=(slideIdx-1+slides.length)%slides.length;
    slides[slideIdx].classList.add('active-img');
}

/* FIREWORKS LOGIC WITH MUSIC SWITCH */
function fireworks(){
    next(7);
    bgMusic.pause(); // Stop background music
    fireMusic.play(); // Start firework music

    const canvas=document.getElementById("fwCanvas");
    const c=canvas.getContext("2d");
    canvas.width=innerWidth; canvas.height=innerHeight;
    let particles=[];

    setInterval(()=>{
        let x=Math.random()*canvas.width;
        let y=Math.random()*canvas.height/2;
        for(let i=0;i<80;i++){
            particles.push({x,y, a:Math.random()*6.28, s:Math.random()*5+2, color:`hsl(${Math.random()*360},100%,50%)`});
        }
    },800);

    function draw(){
        c.fillStyle="rgba(0,0,0,0.2)";
        c.fillRect(0,0,canvas.width,canvas.height);
        particles.forEach((p, index)=>{
            p.x+=Math.cos(p.a)*p.s; p.y+=Math.sin(p.a)*p.s;
            c.beginPath(); c.arc(p.x,p.y,2,0,6.28); c.fillStyle=p.color; c.fill();
        });
        requestAnimationFrame(draw);
    }
    draw();

    setTimeout(()=> document.getElementById("finalBtn").style.display="block", 25000);
}

function showFinal(){
    next(8);
    type("endMsg", "Sorry I couldn't do fireworks in reality but I could do that digitally. I hope this small surprise gave you a smile and it's a three days brain storming work, I hope you liked it.\n\n~From Yatin");
}
</script>
</body>
</html>
