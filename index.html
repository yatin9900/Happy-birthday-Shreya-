<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday Shreya</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@1&family=Dancing+Script&display=swap" rel="stylesheet">

<style>
:root{
--gold:#C9A227; /* premium gold */
--black:#000;
}

body{
margin:0;
background:linear-gradient(to bottom, #050505, #000);
color:white;
font-family:'Playfair Display', serif;
overflow:hidden;
text-align:center;
}

/* 🌌 STARS */
canvas#stars{
position:fixed;
top:0;
left:0;
z-index:-1;
}

/* PAGE */
.page{
display:none;
min-height:100vh;
justify-content:center;
align-items:center;
flex-direction:column;
padding:20px;
}
.active{display:flex;}

h1{
color:var(--gold);
font-style:italic;
text-shadow:0 0 15px rgba(201,162,39,0.8);
}

/* BUTTON */
button{
background:var(--gold);
border:none;
padding:12px 25px;
border-radius:30px;
font-weight:bold;
cursor:pointer;
margin-top:20px;
display:none;
}

/* GIF */
.gif{
position:absolute;
top:10px;
right:10px;
width:120px;
}

/* 🎈 BALLOONS (colorful) */
.row{display:flex; gap:15px;}
.balloon{
width:80px;
height:100px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
color:white;
font-weight:bold;
animation:bounce 2s infinite;
}
.balloon:nth-child(1){background:#ff4d4d;}
.balloon:nth-child(2){background:#4da6ff;}
.balloon:nth-child(3){background:#ff66cc;}
.balloon:nth-child(4){background:#b366ff;}

.popped{
background:transparent !important;
border:2px dashed var(--gold);
}

/* CAKE */
.cake{width:220px;height:120px;background:#5a2d0c;border-radius:10px;position:relative;}
.icing{position:absolute;top:-15px;width:220px;height:40px;background:#fff;border-radius:50%;}
.candle{width:15px;height:50px;background:var(--gold);position:absolute;top:-60px;left:100px;display:none;}
.flame{
width:10px;height:20px;background:orange;border-radius:50%;
position:absolute;top:-20px;left:2px;display:none;
animation:flicker 0.15s infinite;
}

/* SLIDER */
.slider{width:300px;height:400px;}
.slide{width:100%;height:100%;display:none;object-fit:cover;}
.active-img{display:block;}

/* LETTER */
.letter{
background:#fff;
color:black;
padding:30px;
max-width:600px;
font-family:'Dancing Script', cursive;
}

/* FIREWORK */
#fwCanvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
}

/* ANIMATIONS */
@keyframes bounce{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-12px);}
}
@keyframes flicker{
0%{transform:scale(1);}
50%{transform:scale(1.2);}
100%{transform:scale(1);}
}
</style>
</head>

<body>

<!-- 🌌 STARS -->
<canvas id="stars"></canvas>

<audio id="bgMusic" src="bg.mp3" loop></audio>

<!-- PAGE 1 -->
<div class="page active" id="p1">
<img src="girl.gif" class="gif">
<h1 id="title"></h1>
<p id="subtitle"></p>
<button id="startBtn" onclick="next(2)">Start the surprise</button>
</div>

<!-- PAGE 2 -->
<div class="page" id="p2">
<div class="cake">
<div class="icing"></div>
<div class="candle" id="candle">
<div class="flame" id="flame"></div>
</div>
</div>

<h1 id="hbd" style="display:none;">Happy Birthday Shreya!!</h1>

<button id="decorateBtn" onclick="decorate()">Decorate</button>
<button id="lightBtn" onclick="light()">Light the candle</button>
<button id="nextBtn" onclick="next(3)">Pop the Balloon</button>
</div>

<!-- PAGE 3 -->
<div class="page" id="p3">
<h1>Pop them!</h1>
<div class="row">
<div class="balloon" onclick="pop(this,'You')"></div>
<div class="balloon" onclick="pop(this,'Are')"></div>
<div class="balloon" onclick="pop(this,'Truly')"></div>
<div class="balloon" onclick="pop(this,'Special')"></div>
</div>
<button id="nextB" onclick="next(4)">Next</button>
</div>

<!-- REST SAME -->
<div class="page" id="p4">
<h1>CUTIEE &lt;3</h1>
<div class="slider">
<img src="photo1.jpg" class="slide active-img">
<img src="photo2.jpg" class="slide">
<img src="photo3.jpg" class="slide">
</div>
<button onclick="prev()">←</button>
<button onclick="nextSlide()">→</button>
<button onclick="next(5)">Open my message</button>
</div>

<div class="page" id="p5">
<div class="letter" id="letter"></div>
<button id="next5" onclick="next(6)">Next</button>
</div>

<div class="page" id="p6">
<p>Continue to see fireworks</p>
<button onclick="fireworks()">Show Fireworks</button>
</div>

<div class="page" id="p7">
<canvas id="fwCanvas"></canvas>
<h2 id="endMsg"></h2>
</div>

<script>
/* 🌌 STARS BACKGROUND */
const starCanvas=document.getElementById("stars");
const sctx=starCanvas.getContext("2d");

starCanvas.width=innerWidth;
starCanvas.height=innerHeight;

let stars=[];
for(let i=0;i<120;i++){
stars.push({
x:Math.random()*starCanvas.width,
y:Math.random()*starCanvas.height,
r:Math.random()*1.5,
speed:Math.random()*0.5
});
}

function animateStars(){
sctx.clearRect(0,0,starCanvas.width,starCanvas.height);
stars.forEach(s=>{
s.y+=s.speed;
if(s.y>starCanvas.height) s.y=0;

sctx.beginPath();
sctx.arc(s.x,s.y,s.r,0,Math.PI*2);
sctx.fillStyle="white";
sctx.fill();
});
requestAnimationFrame(animateStars);
}
animateStars();

/* REST SAME LOGIC */
let popCount=0, slide=0;

function type(el,text,speed,cb){
let i=0; el.innerHTML="";
function t(){
if(i<text.length){el.innerHTML+=text[i++]; setTimeout(t,speed);}
else if(cb) cb();
}
t();
}

type(title,"A Very Special And Precious Girl Was Born 17 years ago",40,()=>{
type(subtitle,"Yes, it's YOU! A small birthday gift from me",30,()=>{
startBtn.style.display="block";
});
});

function next(n){
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
document.getElementById('p'+n).classList.add('active');

if(n==2){
bgMusic.play();
setTimeout(()=>decorateBtn.style.display="block",1000);
}

if(n==5){
type(letter,"Happy Birthday Shreya!...",25,()=>{
next5.style.display="block";
});
}
}

function decorate(){lightBtn.style.display="block"; candle.style.display="block";}
function light(){flame.style.display="block"; hbd.style.display="block"; nextBtn.style.display="block";}

function pop(el,text){
if(!el.classList.contains('popped')){
el.classList.add('popped');
el.innerText=text;
popCount++;
if(popCount==4) nextB.style.display="block";
}
}

function nextSlide(){
let s=document.querySelectorAll('.slide');
s[slide].classList.remove('active-img');
slide=(slide+1)%s.length;
s[slide].classList.add('active-img');
}
function prev(){
let s=document.querySelectorAll('.slide');
s[slide].classList.remove('active-img');
slide=(slide-1+s.length)%s.length;
s[slide].classList.add('active-img');
}

/* FIREWORK */
function fireworks(){
next(7);
let boom=new Audio("boom.mp3");

const canvas=fwCanvas;
const ctx=canvas.getContext("2d");
canvas.width=innerWidth;
canvas.height=innerHeight;

let particles=[];

function create(){
let x=Math.random()*canvas.width;
let y=Math.random()*canvas.height/2;

for(let i=0;i<80;i++){
particles.push({x,y,angle:Math.random()*6.28,speed:Math.random()*5+2,life:100});
}
boom.currentTime=0;
boom.play();
}

function draw(){
ctx.fillStyle="rgba(0,0,0,0.2)";
ctx.fillRect(0,0,canvas.width,canvas.height);

particles.forEach((p,i)=>{
p.x+=Math.cos(p.angle)*p.speed;
p.y+=Math.sin(p.angle)*p.speed;
p.life--;

ctx.beginPath();
ctx.arc(p.x,p.y,2,0,6.28);
ctx.fillStyle= "hsl(" + Math.random()*50 + ",100%,50%)";
ctx.fill();

if(p.life<=0) particles.splice(i,1);
});

requestAnimationFrame(draw);
}

setInterval(create,800);
draw();
}
</script>

</body>
</html>
